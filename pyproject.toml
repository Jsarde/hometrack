# Single source of truth for the entire project: package metadata, runtime dependencies,
# dependency groups and tool configuration stubs.

[project]
name = "hometrack"
version = "0.1.0"
description = "A privacy-first, self-hosted home expense tracker."
readme = "README.md"
requires-python = ">=3.12"
authors = [{ name = "Jacopo Sardellini" }]

dependencies = [
    "alembic>=1.18.4",
    "nicegui>=3.9.0",
    "polars>=1.39.3",
    "pydantic-settings>=2.13.1",
    "python-dateutil>=2.9.0.post0",
    "sqlalchemy>=2.0.48",
]

[dependency-groups]
dev = [
    "pre-commit>=4.5.1",
    "ruff>=0.15.7",
    "ty>=0.0.24",
]

test = [
    "factory-boy>=3.3.3",
    "faker>=40.11.0",
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.1.0",
]

[project.scripts]
hometrack = "hometrack.main:run"

# ---------------------------------------------------------------------------
# uv — Package manager.
# ---------------------------------------------------------------------------
[tool.uv]
default-groups = ["dev", "test"]

# ---------------------------------------------------------------------------
# Ruff — Linter and Formatter.
# ---------------------------------------------------------------------------

[tool.ruff]
line-length = 88
indent-width = 4
target-version = "py312"
# Directories that are never analysed.
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "alembic/versions",  # auto-generated migrations
    "dist",
    "build",
]

# Formatter.
[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "lf"

# Rule sets enabled. Each prefix is a plugin.
[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes (undefined names, unused imports)
    "I",   # isort (import ordering)
    "UP",  # pyupgrade (use modern Python syntax)
    "B",   # flake8-bugbear (likely bugs and brittle design)
    "SIM", # flake8-simplify (simplifiable expressions)
    "S",   # flake8-bandit (security: no eval, no hardcoded secrets, etc.)
    "N",   # pep8-naming
    "ANN", # flake8-annotations (enforce type hints on all public functions)
    "RUF", # Ruff-native rules
    "C90", # mccabe complexity
]
ignore = [
    "S101", # 'assert' is fine in test files (overridden per-file below)
    "E501", # line length is already handled by the formatter
    "B008", # FastAPI depends on default function-call arguments Depends()
]

# Maximum cyclomatic complexity per function
[tool.ruff.lint.mccabe]
max-complexity = 10

# Per-file rule overrides
[tool.ruff.lint.per-file-ignores]
# Test files: allow assert, magic values, and missing annotations on fixtures.
"tests/**/*.py" = ["S101", "ANN", "S105", "S106"]
# Alembic env.py is a template file — relax annotations requirement.
"alembic/env.py" = ["ANN", "INP001"]

# isort settings
[tool.ruff.lint.isort]
known-first-party = ["hometrack"]
force-sort-within-sections = true

# ---------------------------------------------------------------------------
# ty — Static type checker.
# ---------------------------------------------------------------------------
[tool.ty.src]

# Analyse only the application source; tests are checked separately.
include = ["hometrack"]

# ---------------------------------------------------------------------------
# pytest — Test framework.
# ---------------------------------------------------------------------------
[tool.pytest.ini_options]

# Discover tests only in the tests/ directory.
testpaths = ["tests"]

# Default options for every run.
addopts = [
    "--strict-markers",
    "--tb=short",
    "-q",
]

# Register custom markers so --strict-markers does not reject them.
markers = [
    "unit: fast, isolated unit tests (no I/O)",
    "integration: tests that exercise the full API stack",
]

# Required for pytest-asyncio auto mode.
asyncio_mode = "auto"

# ---------------------------------------------------------------------------
# Coverage (driven by pytest-cov)
# ---------------------------------------------------------------------------
[tool.coverage.run]
source = ["hometrack"]
branch = true
omit = [
    "hometrack/main.py",   # UI entry point — tested via integration tests
    "hometrack/ui/*",      # NiceGUI pages — tested manually / e2e
]

[tool.coverage.report]
show_missing = true
skip_covered = false
fail_under = 80
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "@overload",
]
