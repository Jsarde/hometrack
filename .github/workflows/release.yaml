# Release workflow for HomeTrack.
# Triggered by pushing a version tag: git tag v0.1.0 && git push --tags
# Builds and pushes the OCI image to ghcr.io, then creates a GitHub Release.

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  PYTHON_VERSION: "3.12"
  UV_FROZEN: "1"
  # Image name: ghcr.io/<owner>/hometrack
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/hometrack

jobs:
  # Safety gate: tests must pass before we release anything.
  test-gate:
    name: Test Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.13"
          enable-cache: true

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --group test

      - name: Run tests
        run: uv run pytest --cov=hometrack --cov-fail-under=80

  # Build and push the OCI container image.
  build-and-push:
    name: Build & Push Container
    runs-on: ubuntu-latest
    needs: test-gate
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Use docker/build-push-action — it is OCI-compatible and works with
      # Containerfile via the 'file' input. No Docker daemon knowledge of
      # proprietary features is required.
      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
